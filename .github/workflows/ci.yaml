name: CI
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

      - name: Clippy (native)
        run: nix develop --command cargo clippy --bin scarlet -- -D warnings -A dead-code

      - name: Clippy (wasm)
        run: nix develop --command cargo clippy --lib --target wasm32-unknown-unknown -- -D warnings -A dead-code

      - name: Build binary
        run: nix develop --command cargo build --bin scarlet --locked

      - name: wasm-pack build (web)
        run: nix develop --command wasm-pack build --target web --dev

      - name: wasm-pack build (bundler)
        run: nix develop --command wasm-pack build --target bundler --dev

      - name: wasm-pack build (nodejs)
        run: nix develop --command wasm-pack build --target nodejs --dev
